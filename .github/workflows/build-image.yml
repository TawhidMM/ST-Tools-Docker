name: ST Tools Build

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Select the project to build'
        required: true
        default: 'scribbledom'
        type: choice
        options:
          - scribbledom
          - staig
          - deepst
      tag:
        description: 'Image tag'
        required: true
        default: 'latest'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # IMPORTANT: Clears ~20GB of disk space. 
      # Necessary for heavy CUDA/R builds that often crash free GitHub runners.
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo apt-get clean

      - name: Prepare Image Metadata
        id: prep
        run: |
          # Converts repo name to lowercase (e.g., TawhidMM/MyRepo -> tawhidmm/myrepo)
          OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}
          PROJECT_NAME=${{ github.event.inputs.project }}
          TAG=${{ github.event.inputs.tag }}
          
          echo "image_name=ghcr.io/${OWNER_LC}/${PROJECT_NAME}:${TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          # Focuses Docker ONLY on the selected project folder
          context: ./${{ github.event.inputs.project }}
          # Assumes the Dockerfile is inside that folder
          file: ./${{ github.event.inputs.project }}/Dockerfile
          push: true
          tags: ${{ steps.prep.outputs.image_name }}
          # Maintains your existing GHA caching strategy
          cache-from: type=gha
          cache-to: type=gha,mode=max